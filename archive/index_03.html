<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甜心夾娃娃機 Plus 下爪版</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #ffe6f2 0%, #fff7fb 100%);
      color: #5a3d4d;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }
    .card, .machine, .showcase, .leaderboard {
      background: #fff;
      border: 4px solid #f8bfd8;
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(225, 131, 175, 0.18);
    }
    .card { padding: 20px; }
    h1, h2, h3 {
      margin: 0 0 10px;
      color: #d45c92;
      text-align: center;
    }
    p {
      color: #8b6678;
      line-height: 1.7;
      text-align: center;
    }
    .top-actions, .controls, .board-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: none;
      background: #ff8fbc;
      color: white;
      font-size: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      min-width: 96px;
      box-shadow: 0 6px 14px rgba(236, 113, 164, 0.2);
    }
    .start-btn { background: linear-gradient(90deg, #ff93c2, #ffb36c); }
    .coin-btn { background: #ffb347; }
    .secondary-btn { background: linear-gradient(90deg, #ffb7cf, #ffc9a6); }

    .hud {
      margin-top: 18px;
      background: #fff;
      border: 3px solid #f8bfd8;
      border-radius: 18px;
      padding: 12px;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    #message {
      width: 100%;
      text-align: center;
      font-weight: bold;
      color: #d45c92;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
      align-items: start;
    }

    .machine, .showcase, .leaderboard {
      padding: 16px;
    }

    .top-bar {
      width: 100%;
      height: 18px;
      background: repeating-linear-gradient(
        45deg,
        #ffd3e6,
        #ffd3e6 12px,
        #ffc1da 12px,
        #ffc1da 24px
      );
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .claw-track {
      position: relative;
      height: 80px;
    }

    .claw-arm {
      position: absolute;
      top: 0;
      left: 180px;
      width: 80px;
      transition: left 0.2s ease;
      z-index: 10;
    }

    .claw-head {
      width: 42px;
      height: 14px;
      margin: 0 auto;
      background: #ff89b5;
      border-radius: 999px;
    }

    .rope {
      width: 4px;
      height: 28px;
      background: #9c7b8b;
      margin: 0 auto;
      transition: height 0.3s ease;
    }

    .claw {
      position: relative;
      width: 40px;
      height: 30px;
      margin: 0 auto;
    }

    .finger {
      position: absolute;
      top: 0;
      width: 12px;
      height: 24px;
      border: 4px solid #8e6f7f;
      border-top: none;
      border-radius: 0 0 12px 12px;
      background: transparent;
    }

    .finger.left { left: 2px; transform: rotate(14deg); }
    .finger.right { right: 2px; transform: rotate(-14deg); }

    .claw.closed .finger.left { transform: rotate(5deg); }
    .claw.closed .finger.right { transform: rotate(-5deg); }

    .play-area {
      position: relative;
      margin-top: 8px;
      height: 340px;
      border: 4px solid #ffd0e3;
      border-radius: 18px;
      background: linear-gradient(180deg, #fffafc 0%, #ffeef5 100%);
      overflow: hidden;
    }

    .play-area::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 38px;
      background: #ffd7e8;
    }

    .prize {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 6px 14px rgba(225, 131, 175, 0.12);
      user-select: none;
      transition: left 0.4s ease, top 0.4s ease, transform 0.3s ease;
      z-index: 2;
    }

    .showcase-grid {
      min-height: 180px;
      border: 2px dashed #f6c2d9;
      border-radius: 16px;
      background: #fffafc;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 12px;
      justify-items: center;
      align-items: center;
    }

    .toy {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 6px 14px rgba(225,131,175,.12);
    }

    ol {
      margin: 0;
      padding-left: 22px;
      line-height: 1.9;
      color: #7b5b6b;
      min-height: 140px;
    }

    .hint {
      font-size: 13px;
      color: #8b6678;
      text-align: center;
      margin-top: 10px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .hud { flex-direction: column; align-items: center; }
      .play-area { height: 280px; }
      .prize { width: 46px; height: 46px; font-size: 30px; }
      .claw-arm { left: 130px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>甜心夾娃娃機 Plus 下爪版</h1>
      <p>
        這版保留左右移動與下爪玩法，另外加入金幣、分數、每日補給與本機排行榜。
      </p>

      <div class="top-actions">
        <a href="./index.html"><button class="secondary-btn" type="button">原版首頁</button></a>
        <a href="./index_02.html"><button class="secondary-btn" type="button">精簡積分版</button></a>
      </div>

      <div class="hud">
        <div>🪙 金幣：<span id="coins">100</span></div>
        <div>⭐ 分數：<span id="score">0</span></div>
        <div>🎯 可玩次數：<span id="tries">10</span></div>
        <div id="message">先左右移動，再按下爪試試手氣吧！</div>
      </div>

      <div class="layout">
        <div class="machine">
          <h3>🎀 娃娃機</h3>
          <div class="top-bar"></div>

          <div class="claw-track">
            <div id="clawArm" class="claw-arm">
              <div class="claw-head"></div>
              <div id="rope" class="rope"></div>
              <div id="claw" class="claw">
                <div class="finger left"></div>
                <div class="finger right"></div>
              </div>
            </div>
          </div>

          <div id="playArea" class="play-area"></div>

          <div class="controls">
            <button id="leftBtn">⬅ 左移</button>
            <button id="dropBtn" class="start-btn">下爪（10 金幣）</button>
            <button id="rightBtn">右移 ➡</button>
          </div>

          <div class="hint">
            小提示：爪子對準娃娃上方時再下爪，成功率會比較高。
          </div>
        </div>

        <div class="showcase">
          <h3>🎉 我的展示櫃</h3>
          <div id="showcase" class="showcase-grid"></div>
          <div class="board-actions">
            <button id="dailyBtn" class="coin-btn">每日領 50 金幣</button>
          </div>
        </div>

        <div class="leaderboard">
          <h3>🏆 本機排行榜</h3>
          <ol id="leaderboard"></ol>
          <div class="board-actions">
                        <button id="saveBtn">儲存成績</button>
            <button id="resetBtn" class="secondary-btn">清空排行榜</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const prizePool = [
      { name: "小熊", emoji: "🧸", points: 20, rarity: "common" },
      { name: "兔兔", emoji: "🐰", points: 20, rarity: "common" },
      { name: "小貓", emoji: "🐱", points: 80, rarity: "rare" },
      { name: "企鵝", emoji: "🐧", points: 80, rarity: "rare" },
      { name: "皇冠熊", emoji: "👑", points: 200, rarity: "legendary" }
    ];
    let coins = Number(localStorage.getItem("clawCoins")) || 100;
    let score = Number(localStorage.getItem("clawScore")) || 0;
    let clawX = 180;
    let isDropping = false;
    let prizes = [];

    const coinsEl = document.getElementById("coins");
    const scoreEl = document.getElementById("score");
    const triesEl = document.getElementById("tries");
    const messageEl = document.getElementById("message");
    const leaderboardEl = document.getElementById("leaderboard");
    const showcaseEl = document.getElementById("showcase");
    const playArea = document.getElementById("playArea");
    const clawArm = document.getElementById("clawArm");
    const clawEl = document.getElementById("claw");
    const ropeEl = document.getElementById("rope");

    function saveState() {
      localStorage.setItem("clawCoins", coins);
      localStorage.setItem("clawScore", score);
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function updateUI() {
      coinsEl.textContent = coins;
      scoreEl.textContent = score;
      triesEl.textContent = Math.floor(coins / 10);
    }

    function getBoard() {
      return JSON.parse(localStorage.getItem("clawLeaderboard") || "[]");
    }

    function renderBoard() {
      const board = getBoard();
      leaderboardEl.innerHTML = board.length
        ? board.map((x, i) => `<li>${i + 1}. ${x.name}｜${x.score} 分｜${x.date}</li>`).join("")
        : "<li>還沒有紀錄，快來成為第一名！</li>";
    }

    function renderShowcase() {
      const list = JSON.parse(localStorage.getItem("clawShowcase") || "[]");
      if (!list.length) {
        showcaseEl.innerHTML = '<div style="grid-column:1/-1;color:#b8899e;text-align:center;">還沒夾到娃娃，快試試手氣！</div>';
        return;
      }
      showcaseEl.innerHTML = list.slice(-8).reverse().map(item =>
        `<div class="toy" title="${item.name} ${item.points}分">${item.emoji}</div>`
      ).join("");
    }

    function addToShowcase(prize) {
      const list = JSON.parse(localStorage.getItem("clawShowcase") || "[]");
      list.push(prize);
      localStorage.setItem("clawShowcase", JSON.stringify(list));
      renderShowcase();
    }

    function saveScore() {
      const name = prompt("輸入暱稱：") || "神秘玩家";
      const board = getBoard();
      board.push({
        name: name.trim() || "神秘玩家",
        score,
        date: new Date().toLocaleDateString("zh-TW")
      });
      board.sort((a, b) => b.score - a.score);
      localStorage.setItem("clawLeaderboard", JSON.stringify(board.slice(0, 10)));
      renderBoard();
      setMessage("成績已儲存到本機排行榜！");
    }

    function dailyBonus() {
      const today = new Date().toDateString();
      const last = localStorage.getItem("clawLastBonusDate");
      if (last === today) {
        alert("今天已經領過每日金幣了！");
        setMessage("今天的每日補給已經領過囉～");
        return;
      }
      coins += 50;
      localStorage.setItem("clawLastBonusDate", today);
      saveState();
      updateUI();
      setMessage("每日補給 +50 金幣，祝你手氣超好！");
    }

    function resetBoard() {
      if (!confirm("確定要清空本機排行榜嗎？")) return;
      localStorage.removeItem("clawLeaderboard");
      renderBoard();
      setMessage("排行榜已清空。");
    }

    function createPrizes() {
      playArea.innerHTML = "";
      prizes = [];
      const cols = [40, 120, 200, 280, 360];
      const rows = [170, 230, 280];

      for (let i = 0; i < 7; i++) {
        const prize = prizePool[Math.floor(Math.random() * prizePool.length)];
        const el = document.createElement("div");
        el.className = "prize";
        el.textContent = prize.emoji;

        const x = cols[Math.floor(Math.random() * cols.length)] + Math.floor(Math.random() * 12);
        const y = rows[Math.floor(Math.random() * rows.length)] + Math.floor(Math.random() * 10);

        el.style.left = x + "px";
        el.style.top = y + "px";

        playArea.appendChild(el);
                prizes.push({ ...prize, x, y, el });
      }
    }

    function moveClaw(delta) {
      if (isDropping) return;
      clawX += delta;
      const maxX = Math.max(20, playArea.clientWidth - 80);
      clawX = Math.max(20, Math.min(maxX, clawX));
      clawArm.style.left = clawX + "px";
    }

    function spendForPlay() {
      if (coins < 10) {
        alert("金幣不足！請先領每日補給。");
        setMessage("金幣不足，先領每日補給吧！");
        return false;
      }
      coins -= 10;
      saveState();
      updateUI();
      return true;
    }

    function getNearestPrize() {
      let best = null;
      let bestDistance = Infinity;
      const clawCenter = clawX + 20;

      prizes.forEach(prize => {
        const prizeCenter = prize.x + 27;
        const dx = Math.abs(prizeCenter - clawCenter);
        if (dx < bestDistance) {
          bestDistance = dx;
          best = prize;
        }
      });

      return { prize: best, distance: bestDistance };
    }

    function dropClaw() {
      if (isDropping) return;
      if (!spendForPlay()) return;

      isDropping = true;
      setMessage("下爪中…");
      ropeEl.style.height = "180px";
      clawEl.classList.add("closed");

      setTimeout(() => {
        const { prize, distance } = getNearestPrize();
        let caught = false;

        if (prize && distance < 38) {
          const baseChance = distance < 18 ? 0.88 : 0.58;
          caught = Math.random() < baseChance;
        }

        if (caught && prize) {
          prize.el.style.top = "120px";
          prize.el.style.left = clawX + "px";
          prize.el.style.transform = "scale(1.1)";

          setTimeout(() => {
            prize.el.remove();
            prizes = prizes.filter(p => p !== prize);

            score += prize.points;
            saveState();
            updateUI();
            addToShowcase(prize);

            if (prize.rarity === "legendary") {
              setMessage(`傳說級 ${prize.name} 到手！+${prize.points} 分`);
            } else if (prize.rarity === "rare") {
              setMessage(`夾到稀有 ${prize.name}！+${prize.points} 分`);
            } else {
              setMessage(`夾到 ${prize.name}！+${prize.points} 分`);
            }

            if (!prizes.length) {
              setTimeout(() => {
                createPrizes();
                setMessage("新的一批娃娃補上囉！");
              }, 600);
            }
          }, 450);
        } else {
          setMessage("差一點點！再調整位置一次試試看～");
        }

        setTimeout(() => {
          ropeEl.style.height = "28px";
          clawEl.classList.remove("closed");
          isDropping = false;
        }, 300);
      }, 700);
    }

    document.getElementById("leftBtn").addEventListener("click", () => moveClaw(-30));
    document.getElementById("rightBtn").addEventListener("click", () => moveClaw(30));
    document.getElementById("dropBtn").addEventListener("click", dropClaw);
    document.getElementById("dailyBtn").addEventListener("click", dailyBonus);
    document.getElementById("saveBtn").addEventListener("click", saveScore);
    document.getElementById("resetBtn").addEventListener("click", resetBoard);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") moveClaw(-30);
      if (e.key === "ArrowRight") moveClaw(30);
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        dropClaw();
      }
    });

    updateUI();
    renderBoard();
    renderShowcase();
    createPrizes();
  </script>
</body>
</html>
