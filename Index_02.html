<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甜心夾娃娃機 Plus</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #ffe6f2 0%, #fff7fb 100%);
      color: #5a3d4d;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    .start-screen,
    .wanted-screen,
    .game-screen {
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: min(960px, 100%);
      background: #fff;
      border: 4px solid #f8bfd8;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(225, 131, 175, 0.22);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand-header h1,
    .brand-header h2 {
      margin: 0 0 10px;
      color: #d45c92;
    }

    .brand-header p {
      margin: 0;
      color: #8b6678;
      line-height: 1.8;
    }

    .menu-wrap {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 22px;
    }

    .entry-card {
      border: 3px solid #f8bfd8;
      border-radius: 24px;
      padding: 24px;
      background: linear-gradient(180deg, #fffafc 0%, #fff0f6 100%);
      text-align: center;
      box-shadow: 0 10px 24px rgba(225, 131, 175, 0.15);
    }

    .entry-icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .entry-card h2 {
      margin: 0 0 10px;
      color: #d45c92;
    }

    .entry-card p {
      color: #8b6678;
      line-height: 1.8;
      min-height: 72px;
    }

    .game-wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .top-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .hud {
      background: #fff;
      border: 3px solid #f8bfd8;
      border-radius: 18px;
      padding: 12px 16px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 8px 20px rgba(255, 163, 196, 0.2);
    }

    #message {
      font-weight: bold;
      color: #d45c92;
      width: 100%;
      text-align: center;
    }

    .layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    .machine {
      width: 460px;
      max-width: 100%;
      background: #fff;
      border: 6px solid #f4a9ca;
      border-radius: 24px;
      padding: 14px 14px 18px;
      box-shadow: 0 16px 30px rgba(225, 131, 175, 0.25);
    }

    .showcase,
    .leaderboard-box {
      width: 240px;
      max-width: 100%;
      background: #fff;
      border: 6px solid #f8bfd8;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 16px 30px rgba(225, 131, 175, 0.18);
      text-align: center;
    }

    .showcase h3,
    .leaderboard-box h3 {
      margin-top: 4px;
      margin-bottom: 12px;
      color: #d45c92;
    }

    .showcase-grid {
      min-height: 180px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      justify-items: center;
      align-items: center;
      background: linear-gradient(180deg, #fffafc 0%, #fff0f6 100%);
      border: 3px dashed #f6c2d9;
      border-radius: 16px;
      padding: 12px;
    }
