
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甜心選物｜實體商品兌換</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, #fdfbff 100%);
      color: #4f4a68;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .hero, .gift-card, .wallet {
      background: #fff;
      border: 4px solid #d6e4ff;
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(130, 150, 220, 0.15);
    }
    .hero, .wallet {
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    h1, h2 {
      margin: 0 0 10px;
      color: #6487d9;
    }
    p {
      color: #6d7190;
      line-height: 1.8;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .btn {
      text-decoration: none;
      border: none;
      background: linear-gradient(90deg, #8ec5ff, #7ea7ff);
      color: white;
      font-size: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 110px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .gift-card {
      padding: 16px;
    }
    .gift-image {
      height: 180px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f7faff 0%, #edf3ff 100%);
      border: 2px dashed #cbdcff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7b8fc8;
      font-size: 18px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .gift-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gift-name {
      font-size: 20px;
      font-weight: bold;
      color: #6487d9;
      margin-bottom: 8px;
    }
    .gift-cost {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: #5b75c8;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .gift-desc {
      color: #6d7190;
      line-height: 1.7;
      min-height: 72px;
      margin-bottom: 12px;
    }
    .gift-note {
      margin-top: 20px;
      background: #fff;
      border: 3px solid #d6e4ff;
      border-radius: 20px;
      padding: 16px;
      color: #6d7190;
      line-height: 1.8;
    }
    .wallet-stats {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .wallet-stat {
      background: #eef4ff;
      color: #5b75c8;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: bold;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .gift-image { height: 220px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🎁 實體商品兌換頁</h1>
      <p>
        這版已經跟 <strong>index05.html</strong> 串接。<br>
        會直接讀取你的點數與兌換券，足夠時就能模擬扣除並完成兌換。
      </p>
      <div class="top-actions">
        <a class="btn" href="./index05.html">回 Index05</a>
        <a class="btn" href="./index04.html">回 Index04</a>
      </div>
    </div>

    <div class="wallet">
      <h2>💼 我的兌換資產</h2>
      <div class="wallet-stats">
        <div class="wallet-stat">💎 點數：<span id="points">0</span></div>
        <div class="wallet-stat">🎟 兌換券：<span id="tickets">0</span></div>
      </div>
    </div>

    <div class="grid" id="giftGrid"></div>
    <div class="gift-note">
      <strong>你之後可以這樣改：</strong><br>
      1. 把圖片區換成真實商品圖<br>
      2. 把商品名稱、兌換需求改成你自己的規則<br>
      3. 真的要出貨時，可把「兌換成功」後再導去 Google Form / LINE 填資料
    </div>
  </div>

  <script>
    const gifts = [
      {
        id: "gift1",
        name: "冰刀鞋",
points: 300,
        tickets: 3,
        desc: "可放品牌、尺寸、保存狀況、適合對象等資訊。",
        image: ""
      },
      {
        id: "gift2",
        name: "鞋套",
        points: 120,
        tickets: 1,
        desc: "可放顏色、材質、尺寸與保存狀況。",
        image: ""
      },
      {
        id: "gift3",
        name: "旋轉板",
        points: 180,
        tickets: 2,
        desc: "可放品牌、磨損程度與適合初學者等資訊。",
        image: ""
      },
      {
        id: "gift4",
        name: "可愛娃娃",
        points: 150,
        tickets: 1,
        desc: "可放尺寸、角色名稱與是否全新等資訊。",
        image: ""
      },
      {
        id: "gift5",
        name: "冰場服飾",
        points: 220,
        tickets: 2,
        desc: "可放尺寸、版型、顏色與品牌資訊。",
        image: ""
      },
      {
        id: "gift6",
        name: "限定小禮包",
        points: 260,
        tickets: 2,
        desc: "可做成限時活動商品，增加收藏與回流感。",
        image: ""
      }
    ];

    let points = Number(localStorage.getItem("clawPoints05")) || 0;
    let tickets = Number(localStorage.getItem("clawTickets05")) || 0;

    const pointsEl = document.getElementById("points");
    const ticketsEl = document.getElementById("tickets");
    const giftGrid = document.getElementById("giftGrid");

    function saveWallet() {
      localStorage.setItem("clawPoints05", points);
      localStorage.setItem("clawTickets05", tickets);
    }

    function updateWallet() {
      pointsEl.textContent = points;
      ticketsEl.textContent = tickets;
    }

    function redeemGift(id) {
      const gift = gifts.find(x => x.id === id);
      if (!gift) return;

      if (points < gift.points || tickets < gift.tickets) {
        alert(`兌換條件不足：需要 ${gift.points} 點 / ${gift.tickets} 張券`);
        return;
      }

      const ok = confirm(`確定要兌換「${gift.name}」嗎？會扣除 ${gift.points} 點 / ${gift.tickets} 張券`);
      if (!ok) return;

      points -= gift.points;
      tickets -= gift.tickets;
      saveWallet();
      updateWallet();

      const redeemed = JSON.parse(localStorage.getItem("clawRedeemedGifts05") || "[]");
      redeemed.push({
        name: gift.name,
        date: new Date().toLocaleDateString("zh-TW"),
        points: gift.points,
        tickets: gift.tickets
      });
      localStorage.setItem("clawRedeemedGifts05", JSON.stringify(redeemed));

      alert(`兌換成功：${gift.name}`);
      renderGifts();
    }

    function renderGifts() {
      giftGrid.innerHTML = gifts.map(gift => {
        const enough = points >= gift.points && tickets >= gift.tickets;
        return `
          <div class="gift-card">
            <div class="gift-image">
              ${gift.image ? `<img src="${gift.image}" alt="${gift.name}">` : `商品圖片區`}
            </div>
            <div class="gift-name">${gift.name}</div>
            <div class="gift-cost">兌換需求：${gift.points} 點 / ${gift.tickets} 張券</div>
            <div class="gift-desc">${gift.desc}</div>
            <button class="btn" onclick="redeemGift('${gift.id}')" ${enough ? "" : "style='opacity:.6'"}>${enough ? "我要兌換" : "點數 / 券不足"}</button>
          </div>
        `;
      }).join("");
    }

    updateWallet();
    renderGifts();
    window.redeemGift = redeemGift;
  </script>
</body>
</html>
