<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q&A｜冰場好物小教室</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #eef8ff 0%, #fff7fb 100%);
      color: #4f4150;
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #fff6fb 100%);
      border: 4px solid #d8eefc;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 14px 30px rgba(150, 190, 220, 0.18);
      text-align: center;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      color: #d45c92;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: #7a6876;
      line-height: 1.8;
      font-size: 16px;
    }

    .qa-board {
      background: #fff;
      border: 4px solid #f5cfe0;
      border-radius: 24px;
      padding: 20px 18px;
      box-shadow: 0 14px 28px rgba(232, 171, 198, 0.18);
    }

    .qa-card {
      background: linear-gradient(180deg, #ffffff 0%, #fff9fc 100%);
      border: 2px solid #f4d4e2;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(226, 182, 201, 0.12);
    }

    .q-label,
    .a-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .q-label {
      background: linear-gradient(90deg, #ff98c4, #ffb68a);
    }

    .a-label {
      background: linear-gradient(90deg, #8bc7ff, #9fe3e8);
      margin-top: 16px;
    }

    .qa-title {
      margin: 0;
      font-size: 22px;
      color: #c84f87;
      line-height: 1.6;
    }

    .qa-text {
      margin: 0;
      color: #6e5b67;
      line-height: 1.9;
      font-size: 15px;
    }

    .qa-text a {
      color: #5b8ec9;
      font-weight: 700;
      text-decoration: none;
      word-break: break-all;
    }

    .qa-text a:hover {
      text-decoration: underline;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #ff98c4, #ffb68a);
      box-shadow: 0 6px 14px rgba(236, 113, 164, 0.22);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-secondary {
      background: linear-gradient(90deg, #8bc7ff, #9fe3e8);
      box-shadow: 0 6px 14px rgba(120, 183, 232, 0.2);
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 12px 30px;
      }

      .hero {
        padding: 22px 16px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 14px;
      }

      .qa-title {
        font-size: 20px;
      }

      .qa-text {
        font-size: 14px;
      }

      .btn-row .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Q&A｜冰場好物小教室</h1>
      <p>這裡整理一些常見問題，讓你更順利發佈徵求資訊，也更容易讓別人看到你要找的好物。</p>
    </section>

    <section class="qa-board">
      <article class="qa-card">
        <div class="q-label">Q1</div>
        <h2 class="qa-title">如何放上可直接顯示圖片的網址？</h2>

        <div class="a-label">A</div>
        <p class="qa-text">
          可用線上免費的圖片 URL 轉換器，例如
          <a href="https://www.image2url.com/zh-TW" target="_blank" rel="noopener noreferrer">https://www.image2url.com/zh-TW</a>。
          產生出網址後，將網址複製，直接貼到圖片輸入的欄位即可。
        </p>
      </article>

      <div class="btn-row">
        <a class="btn btn-secondary" href="./index.html?view=wanted">← 回徵求站</a>
        <a class="btn" href="./index.html">回首頁</a>
      </div>
    </section>
  </div>
</body>
</html>
